<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天九游戏</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>天九游戏</h1>
            <div class="game-info">
                <span id="playerName">玩家: 未连接</span>
                <span id="gameStatus">状态: 等待中</span>
            </div>
            <!-- 房间控制 -->
            <div class="room-controls" style="margin-top:8px;">
                <input id="roomInput" placeholder="输入房间名，例如: room1" style="padding:6px;border-radius:4px;border:1px solid #ccc;" />
                <button id="joinRoomBtn" class="btn">加入房间</button>
                <button id="createRoomBtn" class="btn">创建房间</button>
                <button id="reconnectBtn" class="btn">手动重连</button>
                <span id="currentRoom" style="margin-left:12px;font-weight:600;">房间: main</span>
            </div>
        </div>

        <div class="game-board">
            <!-- 其他玩家 -->
            <div class="players-container">
                <div class="player-position top">
                    <div class="player-info">
                        <div class="player-name">对家</div>
                        <div class="player-cards" id="topPlayerCards">0张牌</div>
                    </div>
                    <canvas id="topPlayerCanvas" width="150" height="100"></canvas>
                </div>

                <div class="player-position left">
                    <div class="player-info">
                        <div class="player-name">左家</div>
                        <div class="player-cards" id="leftPlayerCards">0张牌</div>
                    </div>
                    <canvas id="leftPlayerCanvas" width="100" height="150"></canvas>
                </div>

                <div class="player-position right">
                    <div class="player-info">
                        <div class="player-name">右家</div>
                        <div class="player-cards" id="rightPlayerCards">0张牌</div>
                    </div>
                    <canvas id="rightPlayerCanvas" width="100" height="150"></canvas>
                </div>
            </div>

            <!-- 游戏中心 -->
            <div class="game-center">
                <div class="table" id="gameTable"></div>
                <div class="round-info" id="roundInfo">第1轮</div>
            </div>

            <!-- 当前玩家的手牌 -->
            <div class="player-position bottom">
                <canvas id="myCardsCanvas" width="800" height="150"></canvas>
                <div class="player-controls">
                    <button id="playBtn" class="btn btn-primary">出牌</button>
                    <button id="foldBtn" class="btn btn-secondary">弃牌</button>
                    <button id="clearBtn" class="btn btn-secondary">清除选择</button>
                </div>
            </div>
        </div>

        <!-- 游戏日志 -->
        <div class="log-panel">
            <h3>游戏日志</h3>
            <div id="gameLog" class="log-content"></div>
        </div>
    </div>

    <script src="/static/game.js"></script>
    <script>
        // 绑定房间 UI 与页面交互（简单实现：跳转到带 ?room= 的页面）
        document.addEventListener('DOMContentLoaded', function() {
            const roomInput = document.getElementById('roomInput');
            const joinBtn = document.getElementById('joinRoomBtn');
            const createBtn = document.getElementById('createRoomBtn');
            const reconnectBtn = document.getElementById('reconnectBtn');
            const currentRoomSpan = document.getElementById('currentRoom');

            function getRoomFromURL() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    return params.get('room') || 'main';
                } catch (e) { return 'main'; }
            }
            currentRoomSpan.textContent = '房间: ' + getRoomFromURL();

            joinBtn.addEventListener('click', () => {
                const room = roomInput.value.trim();
                if (!room) { alert('请输入房间名'); return; }
                window.location.search = '?room=' + encodeURIComponent(room);
            });
            createBtn.addEventListener('click', () => {
                const room = roomInput.value.trim();
                if (!room) { alert('请输入房间名'); return; }
                // 创建房间即加入（服务器端房间会在第一次加入时创建）
                window.location.search = '?room=' + encodeURIComponent(room);
            });
            reconnectBtn.addEventListener('click', () => {
                // 简单的重连：刷新页面保留 room 参数
                location.reload();
            });
        });
    </script>
</body>
</html>
